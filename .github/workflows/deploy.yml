name: Atlanta Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, atlanta]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH key
        env:
          ATLANTA_SSH_KEY: ${{ secrets.ATLANTA_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$ATLANTA_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H -p 53621 23.95.218.144 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy info
        run: |
          echo "Deploy at $(date)"
          echo "Runner: $(hostname)"
          echo "Commit: ${{ github.sha }}"

      - name: Verify services
        run: |
          ssh -o StrictHostKeyChecking=no woioeow@23.95.218.144 -p 53621 << 'EOF'
            echo "=== sing-box ==="
            systemctl is-active sing-box
            echo "=== nginx ==="
            docker ps --filter name=nginx --format "{{.Names}}: {{.Status}}"
            echo "=== UFW ==="
            ufw status verbose | head -3
            echo "=== disk ==="
            df -h / | tail -1
          EOF
