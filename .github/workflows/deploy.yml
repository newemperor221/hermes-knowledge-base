name: Atlanta Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, atlanta]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add Atlanta SSH host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H -p 53621 23.95.218.144 >> ~/.ssh/known_hosts 2>/dev/null
          echo "Host key added"

      - name: Sync to Atlanta
        run: |
          echo "Deploy triggered at $(date)"
          echo "Runner: $(hostname)"
          echo "Commit: ${{ github.sha }}"
          echo "Files: ${{ join(steps.changed.outputs.files, ', ') }}"

      - name: Verify services
        run: |
          ssh -o StrictHostKeyChecking=no woioeow@23.95.218.144 -p 53621 << 'EOF'
            echo "=== sing-box ==="
            systemctl is-active sing-box
            echo "=== nginx ==="
            docker ps --filter name=nginx --format "{{.Names}}: {{.Status}}"
            echo "=== UFW ==="
            ufw status verbose | head -3
            echo "=== disk ==="
            df -h / | tail -1
          EOF
